# Setup Kubernetes cluster on Fedora and Ubuntu
---
- name: Setup Kubernetes cluster
  hosts: all
  become: yes
  vars:
    HOME: "/home/{{ ansible_ssh_user }}"
    UpdateAllPackages: no
    TaintedNode: yes
    SetupKataContainers: yes
    kata_version: "3.28.0"
    kubeadm_config_file: kubeadm_config.yaml
    sysctl_configs:
      net.bridge.bridge-nf-call-ip6tables: 1
      net.bridge.bridge-nf-call-iptables: 1
      net.ipv4.ip_forward: 1
    services:
      - cri-o
      - kubelet

  pre_tasks:
    - name: Cleanup local known_hosts - hostname
      delegate_to: localhost
      connection: local
      lineinfile:
        regexp: "{{ ansible_fqdn }}"
        path: ~/.ssh/known_hosts
        state: absent
      when: ansible_connection != 'local'

    - name: Cleanup local known_hosts - IP address
      delegate_to: localhost
      connection: local
      lineinfile:
        regexp: "{{ ansible_default_ipv4.address }}"
        path: ~/.ssh/known_hosts
        state: absent
      when: ansible_connection != 'local'

    - name: Disable swap
      shell: swapoff -a

    - name: Disable swap in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)'
        replace: '# \1'

    - name: Check kvm module
      modprobe:
         name: kvm
         state: present
      when: SetupKataContainers
      ignore_errors: yes
      tags:
        - kata_containers

  tasks:
    - name: Include distro specific vars
      include_vars: vars-{{ ansible_distribution }}.yaml

    - name: Install packages
      block:
        - name: Installing packages
          package:
            name: "{{ PACKAGES }}"
            state: present
          tags:
            - install
        - name: Updating all system packages
          dnf:
            name: '*'
            state: latest
          when: UpdateAllPackages and ansible_distribution == "Fedora"
          tags:
            - install

    - name: Ensuring encoding is set to en_US.utf-8
      lineinfile:
        path: "{{ HOME }}/.bashrc"
        state: present
        line: 'export LANG=en_US.UTF8'
        create: yes
      tags:
        - alias

    - name: Load br_netfilter
      shell:
        cmd: modprobe br_netfilter

    - name: Enable br_netfilter module
      lineinfile:
        state: present
        create: yes
        dest: /etc/modules-load.d/br_netfilter.conf
        line: 'br_netfilter'

    - name: Enable CRI-O
      shell: dnf module enable -y cri-o:1.18
      when: ansible_distribution == "Fedora"

    - name: Install CRI-O on Fedora
      dnf:
        name: cri-o
        state: present
      when: ansible_distribution == "Fedora"

    - name: Configure containerd for Kubernetes on Ubuntu
      block:
        - name: Ensure containerd config directory exists
          file:
            path: /etc/containerd
            state: directory

        - name: Generate default containerd config
          shell: containerd config default > /etc/containerd/config.toml
          args:
            creates: /etc/containerd/config.toml

        - name: Enable SystemdCgroup in containerd config
          replace:
            path: /etc/containerd/config.toml
            regexp: 'SystemdCgroup = false'
            replace: 'SystemdCgroup = true'
      when: ansible_distribution == "Ubuntu"

    - name: Enable sysctl settings
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        state: present
        reload: yes
      with_dict: "{{ sysctl_configs }}"

    - name: Add K8s repo
      block:
        - name: Add yum repository
          yum_repository:
            name: kubernetes
            description: Kubernetes repo
            baseurl: https://packages.cloud.google.com/yum/repos/kubernetes-el7-$basearch
            gpgkey: "{{ REPO_GPGKEY }}"
            exclude: kubelet kubeadm kubectl
          when: ansible_distribution == "Fedora"
        - name: Add apt repository
          block:
            - name: Create keyrings directory
              file:
                path: /etc/apt/keyrings
                state: directory
                mode: '0755'
            - name: Add K8s apt repository key
              shell: |
                curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | \
                  gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
              args:
                creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            - name: Add K8s apt repository
              apt_repository:
                repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /"
                filename: kubernetes
                state: present
                update_cache: yes
          when: ansible_distribution == "Ubuntu"

    - name: Install Kubernetes packages
      block:
        - name: Install Kubernetes packages on Fedora
          dnf:
            name:
              - kubelet
              - kubeadm
              - kubectl
            disable_excludes: kubernetes
            state: present
          when: ansible_distribution == "Fedora"
        - name: Install Kubernetes packages on Ubuntu
          apt:
            name:
              - kubelet
              - kubeadm
              - kubectl
            state: present
          when: ansible_distribution == "Ubuntu"

    - name: Put SELinux in permissive mode
      selinux:
        policy: "{{ SELINUX_POLICY }}"
        state: permissive
      when: ansible_distribution == "Fedora"

    - name: Enable container runtime and kubelet
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      with_items:
        - "{{ services }}"

    - name: Copy kubeadm_config file
      copy:
        src: "{{ playbook_dir }}/files/{{ kubeadm_config_file }}"
        dest: "{{ HOME }}/kubeadm_config.yaml"
        owner: root
        group: root
        mode: '0555'
      tags:
        - kubeadm_init

    - name: Create kubeadm cluster
      shell: kubeadm reset -f && kubeadm init --config {{ HOME }}/kubeadm_config.yaml
      register: debug_kubeadm_init
      tags:
        - kubeadm_init
    - debug: var=debug_kubeadm_init.stdout_lines

    - name: Create {{ HOME }}/.kube for {{ ansible_ssh_user }}
      file:
        path: "{{ HOME }}/.kube"
        state: directory
      tags:
        - kubeadm_init

    - name: Copy the Kubernetes configuration file for {{ ansible_ssh_user }}
      shell: cp -f /etc/kubernetes/admin.conf {{ HOME }}/.kube/config && chown {{ ansible_ssh_user }}:{{ ansible_ssh_user }} {{ HOME }}/.kube -R
      tags:
        - kubeadm_init

    - name: Create ~/.kube for root
      file:
        path: ~/.kube
        state: directory
      tags:
        - kubeadm_init

    - name: Copy the Kubernetes configuration file for root
      shell: cp -f /etc/kubernetes/admin.conf ~/.kube/config
      tags:
        - kubeadm_init

    - name: Restore CNI plugin binaries on Ubuntu after kubeadm reset
      shell: apt-get install --reinstall -y kubernetes-cni
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: ansible_distribution == "Ubuntu"
      tags:
        - kubeadm_init

    - name: Install Flannel CNI
      shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      tags:
        - kubeadm_init

    - name: Allow scheduling Pods on the control-plane node
      shell: |
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- 2>/dev/null || true
        kubectl taint nodes --all node-role.kubernetes.io/master- 2>/dev/null || true
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: TaintedNode
      tags:
        - tainted_node

    - name: Install Kata Containers via helm
      shell: |
        helm upgrade --install kata-deploy \
          oci://ghcr.io/kata-containers/kata-deploy-charts/kata-deploy \
          --version {{ kata_version }} \
          --namespace kube-system \
          --set k8sDistribution=k8s \
          --set shims.disableAll=true \
          --set shims.qemu.enabled=true \
          --wait --timeout 10m
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
        HOME: /root
      when: SetupKataContainers
      tags:
        - kata_containers

    - name: Wait for kata-deploy daemonset rollout
      shell: kubectl rollout status daemonset/kata-deploy -n kube-system --timeout=5m
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: SetupKataContainers
      tags:
        - kata_containers
